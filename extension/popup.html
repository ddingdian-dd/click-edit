<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  width: 260px;
  padding: 16px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color: #1f2329;
}
h1 { font-size: 14px; font-weight: 700; }
p { margin-top: 6px; font-size: 12px; color: #646a73; line-height: 1.5; }
.btn {
  display: block;
  width: 100%;
  margin-top: 14px;
  padding: 10px 0;
  border: 0;
  border-radius: 8px;
  font: 600 13px/1 inherit;
  cursor: pointer;
  color: #fff;
  background: #3370ff;
}
.btn--off { background: #f0f1f5; color: #1f2329; }
.status { margin-top: 10px; font-size: 11px; color: #8f959e; text-align: center; }
</style>
</head>
<body>
<h1>Click-Edit</h1>
<p>点击下方按钮在当前页面启用/停用编辑器。</p>
<button id="toggle" class="btn">启用编辑器</button>
<div class="status" id="status"></div>
<script src="popup.js"></script>
</body>
</html>
