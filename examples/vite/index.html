<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Click-Edit Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #f5f6f8; }
    main { max-width: 800px; margin: 60px auto; padding: 0 20px; }
    .hero { background: #fff; border-radius: 16px; padding: 48px 40px; text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,.06); }
    .hero h1 { font-size: 32px; color: #1f2329; margin-bottom: 12px; }
    .hero p { font-size: 16px; color: #646a73; line-height: 1.6; }
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 32px; }
    .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,.04); }
    .card h3 { font-size: 16px; color: #1f2329; margin-bottom: 8px; }
    .card p { font-size: 14px; color: #8f959e; line-height: 1.5; }
    .btn { display: inline-block; margin-top: 32px; padding: 12px 32px; background: #3370ff; color: #fff; border-radius: 8px; font-size: 15px; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
  <main>
    <section class="hero" data-ce-id="hero">
      <h1 data-ce-id="hero-title">Click-Edit</h1>
      <p data-ce-id="hero-desc">选中元素，用属性面板或自然语言修改样式，即时预览效果。</p>
      <a href="#" class="btn" data-ce-id="hero-btn">开始体验</a>
    </section>
    <div class="cards">
      <div class="card" data-ce-id="card-1">
        <h3>颜色</h3>
        <p>背景色、文字色一键修改</p>
      </div>
      <div class="card" data-ce-id="card-2">
        <h3>间距</h3>
        <p>Padding / Margin 四方向调节</p>
      </div>
      <div class="card" data-ce-id="card-3">
        <h3>布局</h3>
        <p>Flex 方向、对齐方式可视化配置</p>
      </div>
    </div>
  </main>
</body>
</html>
